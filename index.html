/* ─── Date helpers ─── */
function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff);
  date.setHours(0,0,0,0);
  return date;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

/* ─── CSV Import Modal ─── */
function CSVImportModal({ open, onClose, onImport }) {
  const [preview, setPreview] = useState(null);
  const [mapping, setMapping] = useState({});
  const fileRef = useRef();

  function parseCSV(text) {
    const lines = text.trim().split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g,'')));
    if (lines.length < 2) return null;
    return { headers: lines[0], rows: lines.slice(1) };
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const parsed = parseCSV(ev.target.result);
      setPreview(parsed);
      if (parsed) {
        const auto = {};
        parsed.headers.forEach((h, i) => {
          const lh = h.toLowerCase();
          if (lh.includes('name') || lh.includes('project') || lh.includes('deal') || lh.includes('title')) auto.name = i;
          if (lh.includes('start') || lh.includes('begin')) auto.startDate = i;
          if (lh.includes('end') || lh.includes('close') || lh.includes('finish')) auto.endDate = i;
          if (lh.includes('employee') || lh.includes('assign') || lh.includes('team') || lh.includes('crew') || lh.includes('owner')) auto.employees = i;
        });
        setMapping(auto);
      }
    };
    reader.readAsText(file);
  }

  function handleImport() {
    if (!preview || mapping.name === undefined) return;
    const projects = preview.rows.filter(r => r[mapping.name]).map(row => {
      const name = row[mapping.name] || 'Untitled';
      let startDate = mapping.startDate !== undefined ? row[mapping.startDate] : '';
      let endDate = mapping.endDate !== undefined ? row[mapping.endDate] : '';
      if (startDate) { const d = new Date(startDate); if (!isNaN(d)) startDate = fmtDate(d); else startDate = ''; }
      if (endDate) { const d = new Date(endDate); if (!isNaN(d)) endDate = fmtDate(d); else endDate = ''; }
      if (!startDate) startDate = fmtDate(new Date());
      if (!endDate) endDate = startDate;
      let employees = [];
      if (mapping.employees !== undefined && row[mapping.employees]) {
        employees = row[mapping.employees].split(/[;|\/]/).map(s => s.trim()).filter(Boolean);
      }
      return { name, startDate, endDate, employees, equipment: [] };
    });
    onImport(projects);
    setPreview(null); setMapping({});
    onClose();
  }

  const selStyle = { padding:'6px 10px',borderRadius:6,border:'1px solid #d1d5db',fontSize:13,background:'#fff',minWidth:120 };

  return React.createElement(Modal, { open, onClose, title:'Import Projects from CSV', width:600 },
    React.createElement('div', { style:{ display:'flex',flexDirection:'column',gap:16 }},
      React.createElement('p', { style:{ fontSize:13,color:'#6b7280' }}, 'Upload a CSV exported from HubSpot or any source. Map columns to project fields.'),
      React.createElement('input', { type:'file', accept:'.csv', ref:fileRef, onChange:handleFile, style:{ fontSize:13 }}),
      preview && React.createElement('div', { style:{ display:'flex',flexDirection:'column',gap:12 }},
        React.createElement('div', { style:{ background:'#f9fafb',padding:12,borderRadius:8,border:'1px solid #e5e7eb' }},
          React.createElement('div', { style:{ fontWeight:600,fontSize:13,marginBottom:8 }}, 'Column Mapping'),
          React.createElement('div', { style:{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:8 }},
            ...['Project Name *','Start Date','End Date','Employees'].flatMap((label, idx) => {
              const keys = ['name','startDate','endDate','employees'];
              const key = keys[idx];
              return [
                React.createElement('label', { key:label, style:{ fontSize:12,color:'#374151' }}, label),
                React.createElement('select', { key:key, value:mapping[key] ?? '', onChange:e => setMapping({...mapping, [key]: e.target.value === '' ? undefined : +e.target.value}), style:selStyle },
                  React.createElement('option', { value:'' }, '\u2014 Select \u2014'),
                  preview.headers.map((h,i) => React.createElement('option', { key:i, value:i }, h))
                )
              ];
            })
          )
        ),
        React.createElement('div', { style:{ background:'#f9fafb',padding:12,borderRadius:8,border:'1px solid #e5e7eb',maxHeight:150,overflow:'auto' }},
          React.createElement('div', { style:{ fontWeight:600,fontSize:13,marginBottom:4 }}, `Preview (${preview.rows.length} rows)`),
          React.createElement('table', { style:{ fontSize:11,width:'100%',borderCollapse:'collapse' }},
            React.createElement('thead', {},
              React.createElement('tr', {}, preview.headers.map((h,i) => React.createElement('th', { key:i, style:{ textAlign:'left',padding:'2px 6px',borderBottom:'1px solid #e5e7eb',background: Object.values(mapping).includes(i) ? '#dbeafe' : 'transparent' }}, h)))
            ),
            React.createElement('tbody', {},
              preview.rows.slice(0,5).map((row,ri) => React.createElement('tr', { key:ri },
                row.map((cell,ci) => React.createElement('td', { key:ci, style:{ padding:'2px 6px',borderBottom:'1px solid #f3f4f6',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}, cell))
              ))
            )
          )
        ),
        React.createElement('button', {
          onClick: handleImport, disabled: mapping.name === undefined,
          style:{ padding:'10px 20px',borderRadius:8,border:'none',fontWeight:600,fontSize:14,cursor: mapping.name !== undefined ? 'pointer' : 'not-allowed',background: mapping.name !== undefined ? '#2563eb' : '#d1d5db',color:'#fff',alignSelf:'flex-end' }
        }, `Import ${preview.rows.length} Projects`)
      )
    )
  );
}

    }

    if (!activity) return [];
    const byDay = {};
    for (const a of activity) {

      if (!byDay[day]) byDay[day] = { date: day, users: new Set(), actions: 0 };
      byDay[day].users.add(a.user);
      byDay[day].actions++;

    return Object.values(byDay).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 30).map(d => ({ ...d, users: [...d.users] }));
  }, [activity]);

      counts[a.user].days.add(a.timestamp.substring(0, 10));
      counts[a.user].actions++;
      if (a.timestamp > counts[a.user].lastSeen) counts[a.user].lastSeen = a.timestamp;

        dailySummary.length > 0 && React.createElement('div', { style:{ marginTop:16 }},
          React.createElement('p', { style:{ fontSize:12,color:'#6b7280',margin:'0 0 8px',fontWeight:600 }}, 'Daily breakdown:'),
          React.createElement('div', { style:{ maxHeight:200,overflow:'auto' }},
            dailySummary.map(d => React.createElement('div', { key:d.date, style:{ display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',borderBottom:'1px solid #f1f5f9',fontSize:12 }},
              React.createElement('span', { style:{ fontWeight:600,color:'#374151' }}, new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})),
              React.createElement('span', { style:{ color:'#64748b' }}, d.users.join(', ')),
              React.createElement('span', { style:{ color:'#94a3b8',fontSize:11 }}, d.actions + ' actions')
            ))
          )
        )
      ),

      !loading && tab === 'feed' && React.createElement('div', { style:{ maxHeight:400,overflow:'auto' }},
        (!activity || activity.length === 0) ? React.createElement('p', { style:{ fontSize:13,color:'#94a3b8',textAlign:'center',padding:16 }}, 'No activity recorded yet.') :
        activity.slice(0, 100).map((a, i) => React.createElement('div', { key:i, style:{ display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',borderBottom:'1px solid #f1f5f9',fontSize:12 }},
          React.createElement('span', { style:{ fontSize:14,flexShrink:0 }}, actionIcons[a.action] || '📌'),
          React.createElement('div', { style:{ flex:1,minWidth:0 }},
            React.createElement('span', { style:{ fontWeight:600,color:'#1e293b' }}, a.user || 'Unknown'),
            React.createElement('span', { style:{ color:'#64748b' }}, ' ' + (actionLabels[a.action] || a.action)),
            a.details && React.createElement('span', { style:{ color:'#94a3b8' }}, ' — ' + a.details),
          ),
          React.createElement('span', { style:{ fontSize:11,color:'#94a3b8',whiteSpace:'nowrap',flexShrink:0 }}, a.timestamp ? new Date(a.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '')
        ))
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const [projects, setProjects] = useState([]);
  const [employees, setEmployees] = useState([]);
  const [equipment, setEquipment] = useState([]);
  const [nextId, setNextId] = useState(1);
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState(api.isConnected() ? 'saving' : 'offline');

  const [baseDate, setBaseDate] = useState(getMonday(new Date()));
  const [numWeeks, setNumWeeks] = useState(1);
  const [showProjectModal, setShowProjectModal] = useState(false);
  const [editProject, setEditProject] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [showEmployees, setShowEmployees] = useState(false);
  const [showEquipment, setShowEquipment] = useState(false);
  const [showDashboard, setShowDashboard] = useState(false);
  const [tbdQueue, setTBDQueue] = useState([]);
  const [showTBDQueue, setShowTBDQueue] = useState(true);
  const [newTBDItem, setNewTBDItem] = useState('');
  const [revertedQueue, setRevertedQueue] = useState([]);
  const [showRevertedQueue, setShowRevertedQueue] = useState(true);

  /* ── User identity (stored in localStorage) ── */
  const [currentUser, setCurrentUser] = useState(() => {
    try { return localStorage.getItem('jobboard_user') || ''; } catch { return ''; }
  });
  const [showUserPicker, setShowUserPicker] = useState(false);

  function selectUser(name) {
    setCurrentUser(name);
    try { localStorage.setItem('jobboard_user', name); } catch {}
    setShowUserPicker(false);
    /* Log board open when user first identifies */
    if (api.isConnected()) api.logActivity({ user: name, action: 'board_open', details: '', timestamp: new Date().toISOString() });
  }

  /* ── Activity logging helper ── */
  function logAction(action, details) {
    if (!api.isConnected() || !currentUser) return;
    api.logActivity({ user: currentUser, action, details: details || '', timestamp: new Date().toISOString() });
  }
  const [quickEdit, setQuickEdit] = useState(null);
  const [hoveredProject, setHoveredProject] = useState(null);
  const [viewMode, setViewMode] = useState('employees'); /* 'employees', 'equipment', or 'byPerson' */
  const [projectOrder, setProjectOrder] = useState([]); /* array of project IDs for display order */
  const dragRef = useRef(null); /* tracks which project ID is being dragged */

  /* ── Keep projectOrder in sync — add new projects, remove deleted ones ── */
  useEffect(() => {
    setProjectOrder(prev => {
      const ids = new Set(projects.map(p => p.id));
      const kept = prev.filter(id => ids.has(id));
      const newIds = projects.filter(p => !kept.includes(p.id)).map(p => p.id);
      if (newIds.length === 0 && kept.length === prev.length) return prev;
      return [...kept, ...newIds];
    });
  }, [projects]);

  /* ── Load data on mount ── */
  useEffect(() => {
    async function load() {
      if (api.isConnected()) {
        try {
          const data = await api.getAll();
          if (data.success) {
            const sorted = [...data.projects].sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
            setProjects(sorted);
            setProjectOrder(sorted.map(p => p.id));
            setEmployees((data.employees || []).filter(function(e){ return !PROJECT_MANAGERS.includes(e); }));
            setEquipment(data.equipment || []);
            setTBDQueue(data.tbdQueue || []);
            setRevertedQueue(data.revertedQueue || []);
            setNextId(data.nextId);
            setSyncStatus('saved');
          } else {
            throw new Error(data.error);
          }
        } catch (err) {
          console.error('Failed to load from Google Sheets:', err);
          const demo = getDemoData();
          setProjects(demo.projects); setEmployees(demo.employees); setEquipment(demo.equipment || []); setNextId(demo.nextId);
          setSyncStatus('error');
        }
      } else {
        const demo = getDemoData();
        setProjects(demo.projects); setEmployees(demo.employees); setEquipment(demo.equipment || []); setNextId(demo.nextId);
        setSyncStatus('offline');
      }
      setLoading(false);
    }
    load();
  }, []);

  /* ── Show user picker if no user identified; log board open for returning users ── */
  useEffect(() => {
    if (!loading) {
      if (!currentUser) { setShowUserPicker(true); }
      else if (api.isConnected()) { api.logActivity({ user: currentUser, action: 'board_open', details: '', timestamp: new Date().toISOString() }); }
    }
  }, [loading]);

  /* ── Auto-refresh from Google Sheets every 30 seconds ── */
  useEffect(() => {
    if (!api.isConnected()) return;
    const interval = setInterval(async () => {
      try {
        const data = await api.getAll();
        if (data.success) {
          const sorted = [...data.projects].sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
          setProjects(sorted);
          setProjectOrder(sorted.map(p => p.id));
          setEmployees((data.employees || []).filter(function(e){ return !PROJECT_MANAGERS.includes(e); }));
          setEquipment(data.equipment || []);
          setTBDQueue(data.tbdQueue || []);
            setRevertedQueue(data.revertedQueue || []);
          setNextId(data.nextId);
          setSyncStatus('saved');
        }
      } catch (err) { /* silent fail on background sync */ }
    }, 30000);
    return () => clearInterval(interval);
  }, []);

  const totalDays = numWeeks * 7;
  const days = useMemo(() => { const r=[]; for(let i=0;i<totalDays;i++) r.push(addDays(baseDate,i)); return r; }, [baseDate, totalDays]);
  const weeks = useMemo(() => { const w=[]; for(let i=0;i<numWeeks;i++) w.push(days.slice(i*7,(i+1)*7)); return w; }, [days, numWeeks]);

  function getProjectsForDay(date) { const ds=fmtDate(date); return projects.filter(p=>p.startDate<=ds&&p.endDate>=ds); }

  /* ── Compute spanning project segments for a week row ── */
  function getWeekSegments(weekDays) {
    const ws = fmtDate(weekDays[0]), we = fmtDate(weekDays[6]);
    const segs = [];
    for (const p of projects) {
      if (p.endDate < ws || p.startDate > we) continue;
      let sc = 0;
      if (p.startDate > ws) { for (let i=0;i<7;i++) { if (fmtDate(weekDays[i])>=p.startDate){sc=i;break;} } }
      let ec = 6;
      if (p.endDate < we) { for (let i=6;i>=0;i--) { if (fmtDate(weekDays[i])<=p.endDate){ec=i;break;} } }
      segs.push({ project:p, startCol:sc, endCol:Math.max(sc,ec), isStart:p.startDate>=ws, isEnd:p.endDate<=we });
    }
    segs.sort((a,b)=>{
      const ai = projectOrder.indexOf(a.project.id), bi = projectOrder.indexOf(b.project.id);
      const oa = ai >= 0 ? ai : 9999, ob = bi >= 0 ? bi : 9999;
      return oa - ob || a.startCol - b.startCol;
    });
    const lanes=[];
    for (const s of segs) {
      let placed=false;
      for (let i=0;i<lanes.length;i++){
        if(lanes[i].every(x=>x.endCol<s.startCol||x.startCol>s.endCol)){lanes[i].push(s);s.lane=i;placed=true;break;}
      }
      if(!placed){s.lane=lanes.length;lanes.push([s]);}
    }
    return { segments:segs, numLanes:lanes.length };
  }

  /* ── CRUD with Google Sheets sync ── */
  async function handleSaveProject(data) {
    if (!data.equipment) data.equipment = [];
    const newEmps = data.employees.filter(e => !employees.includes(e));
    if (newEmps.length > 0) setEmployees(prev => [...prev, ...newEmps.filter(function(e){ return !PROJECT_MANAGERS.includes(e); })]);
    const newEquips = data.equipment.filter(e => !equipment.includes(e));
    if (newEquips.length > 0) setEquipment(prev => [...prev, ...newEquips]);

    if (data.id) {
      // Update existing
      setProjects(prev => prev.map(p => p.id === data.id ? { ...p, ...data } : p));
      logAction('project_edit', data.name);
      if (api.isConnected()) {
        setSyncStatus('saving');
        try { await api.updateProject(data); setSyncStatus('saved'); }
        catch { setSyncStatus('error'); }
      }
    } else {
      // Create new — assign sortOrder at the end
      data.sortOrder = projectOrder.length;
      const newProject = { ...data, id: nextId };
      setProjects(prev => [...prev, newProject]);
      setNextId(prev => prev + 1);
      logAction('project_create', data.name);
      if (api.isConnected()) {
        setSyncStatus('saving');
        try {
          const res = await api.createProject(data);
          if (res.id) {
            setProjects(prev => prev.map(p => p.id === newProject.id ? { ...p, id: res.id } : p));
          }
          setSyncStatus('saved');
        } catch { setSyncStatus('error'); }
      }
    }
  }

  async function handleDeleteProject(id) {
    const delName = projects.find(p => p.id === id)?.name || '';
    setProjects(prev => prev.filter(p => p.id !== id));
    logAction('project_delete', delName);
    if (api.isConnected()) {
      setSyncStatus('saving');
      try { await api.deleteProject(id); setSyncStatus('saved'); }
      catch { setSyncStatus('error'); }
    }
  }

  async function handleSplitProject(project, splitDateStr) {
    logAction('project_split', project.name + ' at ' + splitDateStr);
    /* Split a project into two parts at splitDateStr.
       Part 1: original start → day before split date (keeps original crew)
       Part 2: split date → original end (keeps original crew, user edits after) */
    const dayBefore = fmtDate(addDays(new Date(splitDateStr+'T00:00:00'), -1));
    const cc = project.ccChecks || {};
    const cc1 = {}, cc2 = {};
    for (const [d,v] of Object.entries(cc)) { if (d <= dayBefore) cc1[d]=v; else cc2[d]=v; }
    const part1 = { name: project.name, startDate: project.startDate, endDate: dayBefore, color: project.color, employees: [...project.employees], equipment: [...(project.equipment||[])], ccChecks: cc1 };
    const part2 = { name: project.name, startDate: splitDateStr, endDate: project.endDate, color: project.color, employees: [...project.employees], equipment: [...(project.equipment||[])], ccChecks: cc2 };

    /* Remove original project */
    setProjects(prev => prev.filter(p => p.id !== project.id));

    /* Create both parts with new IDs */
    let id = nextId;
    const newPart1 = { ...part1, id: id };
    const newPart2 = { ...part2, id: id + 1 };
    setProjects(prev => [...prev, newPart1, newPart2]);
    setNextId(id + 2);

    /* Sync with Google Sheets */
    if (api.isConnected()) {
      setSyncStatus('saving');
      try {
        await api.deleteProject(project.id);
        const res1 = await api.createProject(part1);
        if (res1.id) setProjects(prev => prev.map(p => p.id === newPart1.id ? { ...p, id: res1.id } : p));
        const res2 = await api.createProject(part2);
        if (res2.id) setProjects(prev => prev.map(p => p.id === newPart2.id ? { ...p, id: res2.id } : p));
        setSyncStatus('saved');
      } catch { setSyncStatus('error'); }
    }

    /* Open Part 2 for editing so user can adjust the crew */
    setTimeout(() => {
      setEditProject(newPart2);
      setShowProjectModal(true);
    }, 300);
  }

  /* ── Toggle CC (CompanyCam) check for a project on a specific day ── */
  async function handleToggleCC(projectId, dateStr) {
    const ccProject = projects.find(p => p.id === projectId);
    logAction('cc_toggle', (ccProject?.name || '') + ' on ' + dateStr);
    let updatedProject;
    setProjects(prev => prev.map(p => {
      if (p.id !== projectId) return p;
      const ccChecks = { ...(p.ccChecks || {}), [dateStr]: !(p.ccChecks && p.ccChecks[dateStr]) };
      updatedProject = { ...p, ccChecks };
      return updatedProject;
    }));
    if (api.isConnected() && updatedProject) {
      setSyncStatus('saving');
      try { await api.updateProject(updatedProject); setSyncStatus('saved'); }
      catch { setSyncStatus('error'); }
    }
  }

  async function handleImportProjects(imported) {
    let id = nextId;
    const newProjects = imported.map(p => ({ ...p, id: id++, color: PROJECT_COLORS[(id-1)%PROJECT_COLORS.length] }));
    setProjects(prev => [...prev, ...newProjects]);
    setNextId(id);
    const allNewEmps = [...new Set(imported.flatMap(p=>p.employees))].filter(e=>!employees.includes(e));
    if (allNewEmps.length > 0) setEmployees(prev => [...prev, ...allNewEmps.filter(function(e){ return !PROJECT_MANAGERS.includes(e); })]);
    if (api.isConnected()) {
      setSyncStatus('saving');
      try { await api.importProjects(newProjects); setSyncStatus('saved'); }
      catch { setSyncStatus('error'); }
    }
  }

  async function handleQuickUpdate(updated) {
    setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));
    setQuickEdit(qe => qe ? { ...qe, project: updated } : null);
    if (api.isConnected()) {
      setSyncStatus('saving');
      try { await api.updateProject(updated); setSyncStatus('saved'); }
      catch { setSyncStatus('error'); }
    }
  }

  async function handleUpdateEmployees(newEmps) {
    setEmployees(newEmps);
    if (api.isConnected()) {
      setSyncStatus('saving');
      try { await api.updateEmployees(newEmps); setSyncStatus('saved'); }
      catch { setSyncStatus('error'); }
    }
  }

  async function handleUpdateEquipment(newEquips) {
    setEquipment(newEquips);
    if (api.isConnected()) {
      setSyncStatus('saving');
      try { await api.updateEquipment(newEquips); setSyncStatus('saved'); }
      catch { setSyncStatus('error'); }
    }
  }

  /* ── TBD Queue handlers ── */
  async function handleAddTBDItem() {
    if (!newTBDItem.trim()) return;
    const updated = [...tbdQueue, newTBDItem.trim()];
    setTBDQueue(updated);
    setNewTBDItem('');
    if (api.isConnected()) {
      setSyncStatus('saving');
      try { await api.updateTBDQueue(updated); setSyncStatus('saved'); }
      catch { setSyncStatus('error'); }
    }
    logAction('tbd_add', newTBDItem.trim());
  }

  async function handleRemoveTBDItem(index) {
    const removed = tbdQueue[index];
    const updated = tbdQueue.filter((_, i) => i !== index);
    setTBDQueue(updated);
    if (api.isConnected()) {
      setSyncStatus('saving');
      try { await api.updateTBDQueue(updated); setSyncStatus('saved'); }
      catch { setSyncStatus('error'); }
    }
    logAction('tbd_remove', removed);
  }

  function navigateWeeks(n) { setBaseDate(addDays(baseDate, n*7)); }
  function goToToday() { setBaseDate(getMonday(new Date())); }

  const today = fmtDate(new Date());
  const usedColors = projects.map(p => p.color);

  /* ── Overbooking detection: find employees assigned to 2+ projects on the same day (visible weeks only) ── */
  const overbookedEmps = useMemo(() => {
    const empDayMap = {}; // { empName: { date: [projectName, ...] } }
    const visStart = days.length > 0 ? fmtDate(days[0]) : '';
    const visEnd = days.length > 0 ? fmtDate(days[days.length - 1]) : '';
    for (const p of projects) {
      const start = parseDate(p.startDate), end = parseDate(p.endDate);
      for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
        const ds = fmtDate(d);
        if (ds < visStart || ds > visEnd) continue;
        for (const emp of p.employees) {
          if (!empDayMap[emp]) empDayMap[emp] = {};
          if (!empDayMap[emp][ds]) empDayMap[emp][ds] = [];
          empDayMap[emp][ds].push(p.name);
        }
      }
    }
    const conflicts = {}; // { empName: [{ date, projects: [...] }, ...] }
    for (const emp of Object.keys(empDayMap)) {
      for (const ds of Object.keys(empDayMap[emp])) {
        if (empDayMap[emp][ds].length > 1) {
          if (!conflicts[emp]) conflicts[emp] = [];
          conflicts[emp].push({ date: ds, projects: empDayMap[emp][ds] });
        }
      }
    }
    return conflicts;
  }, [projects, days]);

  const overbookedSet = useMemo(() => new Set(Object.keys(overbookedEmps)), [overbookedEmps]);

  /* ── Equipment overbooking detection (visible weeks only) ── */
  const overbookedEquip = useMemo(() => {
    const equipDayMap = {};
    const visStart = days.length > 0 ? fmtDate(days[0]) : '';
    const visEnd = days.length > 0 ? fmtDate(days[days.length - 1]) : '';
    for (const p of projects) {
      const start = parseDate(p.startDate), end = parseDate(p.endDate);
      for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
        const ds = fmtDate(d);
        if (ds < visStart || ds > visEnd) continue;
        for (const eq of (p.equipment||[])) {
          if (!equipDayMap[eq]) equipDayMap[eq] = {};
          if (!equipDayMap[eq][ds]) equipDayMap[eq][ds] = [];
          equipDayMap[eq][ds].push(p.name);
        }
      }
    }
    const conflicts = {};
    for (const eq of Object.keys(equipDayMap)) {
      for (const ds of Object.keys(equipDayMap[eq])) {
        if (equipDayMap[eq][ds].length > 1) {
          if (!conflicts[eq]) conflicts[eq] = [];
          conflicts[eq].push({ date: ds, projects: equipDayMap[eq][ds] });
        }
      }
    }
    return conflicts;
  }, [projects, days]);

  const overbookedEquipSet = useMemo(() => new Set(Object.keys(overbookedEquip)), [overbookedEquip]);

  /* ── Available employees per day (unassigned to any project) ── */
  const [showAvailability, setShowAvailability] = useState(true);

  const availableByDay = useMemo(() => {
    const result = {};
    for (const day of days) {
      const ds = fmtDate(day);
      const assignedToday = new Set();
      for (const p of projects) {
        if (p.startDate <= ds && p.endDate >= ds) {
          for (const emp of p.employees) assignedToday.add(emp);
        }
      }
      result[ds] = employees.filter(emp => !assignedToday.has(emp));
    }
    return result;
  }, [days, projects, employees]);

  /* ── By Person view: for each assigned employee, map their projects per day ── */
  const byPersonData = useMemo(() => {
    const empSet = new Set();
    for (const p of projects) {
      for (const day of days) {
        const ds = fmtDate(day);
        if (p.startDate <= ds && p.endDate >= ds) {
          for (const emp of p.employees) empSet.add(emp);
        }
      }
    }
    const assignedEmps = [...empSet].sort((a,b) => a.localeCompare(b));
    const grid = {};
    for (const emp of assignedEmps) {
      grid[emp] = {};
      for (const day of days) {
        const ds = fmtDate(day);
        grid[emp][ds] = projects.filter(p => p.startDate <= ds && p.endDate >= ds && p.employees.includes(emp));
      }
    }
    return { employees: assignedEmps, grid };
  }, [days, projects]);

  const monthYearLabel = useMemo(() => {
    if (days.length === 0) return '';
    const first=days[0]; const last=days[days.length-1];
    const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
    if (first.getMonth()===last.getMonth()) return `${mo[first.getMonth()]} ${first.getFullYear()}`;
    if (first.getFullYear()===last.getFullYear()) return `${mo[first.getMonth()]} \u2013 ${mo[last.getMonth()]} ${first.getFullYear()}`;
    return `${mo[first.getMonth()]} ${first.getFullYear()} \u2013 ${mo[last.getMonth()]} ${last.getFullYear()}`;
  }, [days]);

  function handleRemoveRevertedItem(hubspotDealId) {
    const updated = revertedQueue.filter(function(r){ return r.hubspotDealId !== hubspotDealId; });
    setRevertedQueue(updated);
    api.updateRevertedQueue(updated);
  }

  function renderRevertedQueuePanel() {
    return React.createElement('div', {
      style: { flexShrink:0, borderTop:'2px solid #d1d5db', background:'#fff7ed' }
    },
      React.createElement('div', {
        onClick: () => setShowRevertedQueue(!showRevertedQueue),
        style: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 16px', cursor:'pointer', userSelect:'none' }
      },
        React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:8 } },
          React.createElement('span', { style:{ fontSize:13, fontWeight:700, color:'#9a3412' } }, 'Reverted from PO Awarded'),
          React.createElement('span', { style:{ fontSize:11, fontWeight:700, color:'#9a3412', background:'#ffedd5', padding:'1px 6px', borderRadius:10 } }, String(revertedQueue.length))
        ),
        React.createElement('span', { style:{ fontSize:11, color:'#9a3412' } }, showRevertedQueue ? '\u25b2' : '\u25bc')
      ),
      showRevertedQueue && React.createElement('div', {
        style: { maxHeight:140, overflowY:'auto', padding:'0 16px 10px' }
      },
        revertedQueue.length === 0
          ? React.createElement('div', { style:{ fontSize:12, color:'#9ca3af', fontStyle:'italic', padding:'4px 0' } }, 'No deals have dropped out of PO Awarded.')
          : revertedQueue.map(function(r) {
              return React.createElement('div', {
                key: r.hubspotDealId,
                style: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 8px', marginBottom:4, background:'#fff', border:'1px solid #fed7aa', borderRadius:6, fontSize:12 }
              },
                React.createElement('div', {},
                  React.createElement('div', { style:{ fontWeight:600 } }, r.name),
                  React.createElement('div', { style:{ color:'#9ca3af', fontSize:11 } }, 'Now: ' + r.newStage + ' \u00b7 ' + r.revertedDate)
                ),
                React.createElement('button', {

          React.createElement('span', { style:{ fontSize:14 }}, '\u{1F4C2}'),
          React.createElement('span', { style:{ fontSize:13,fontWeight:700,color:'#334155' }}, 'TBD Project Queue'),
          React.createElement('span', { style:{ fontSize:11,fontWeight:500,color:'#94a3b8' }}, 'Awarded Jobs that are flexible or unknown start date')
        ),
        React.createElement('span', { style:{ fontSize:12,color:'#94a3b8',fontWeight:600 }}, showTBDQueue ? '▼ Hide' : '▶ Show')
      ),
      /* Queue content */
      showTBDQueue && React.createElement('div', {
        style:{ padding:'0 16px 12px' }
      },
        /* Add item row */
        React.createElement('div', { style:{ display:'flex',gap:8,marginBottom:8 }},
          React.createElement('input', {
            type:'text',
            value:newTBDItem,
            onChange:e=>setNewTBDItem(e.target.value),
            onKeyDown:e=>{ if(e.key==='Enter') handleAddTBDItem(); },
            placeholder:'Add a project to the queue...',
            style:{ flex:1,padding:'6px 10px',fontSize:12,border:'1px solid #d1d5db',borderRadius:6,outline:'none',background:'#fff' }
          }),
          React.createElement('button', {
            onClick:handleAddTBDItem,
            style:{ padding:'6px 14px',fontSize:12,fontWeight:600,color:'#fff',background:'#2563eb',border:'none',borderRadius:6,cursor:'pointer',whiteSpace:'nowrap' }
          }, '+ Add')
        ),
        /* List of items */
        tbdQueue.length === 0
          ? React.createElement('div', { style:{ fontSize:12,color:'#94a3b8',fontStyle:'italic',padding:'4px 0' }}, 'No projects in queue')
          : React.createElement('div', { style:{ display:'flex',flexDirection:'column',gap:4 }},
              tbdQueue.map((item, i) =>
                React.createElement('div', {
                  key:i,
                  style:{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 10px',background:'#fff',border:'1px solid #e5e7eb',borderRadius:6,fontSize:12,color:'#334155' }
                },
                  React.createElement('span', { style:{ fontWeight:500 }}, item),
                  React.createElement('button', {
                    onClick:()=>handleRemoveTBDItem(i),
                    title:'Remove from queue',
                    style:{ background:'none',border:'none',cursor:'pointer',fontSize:14,color:'#94a3b8',padding:'0 4px',lineHeight:1 },
                    onMouseOver:e=>e.currentTarget.style.color='#dc2626',
                    onMouseOut:e=>e.currentTarget.style.color='#94a3b8'
                  }, '×')
                )
              )
            )
      )
    ),

    /* ── Overbooking warnings ── */
    (Object.keys(overbookedEmps).length > 0 || Object.keys(overbookedEquip).length > 0) && React.createElement('div', {
      style:{ padding:'8px 16px',background:'#fef2f2',borderTop:'2px solid #fca5a5',display:'flex',alignItems:'flex-start',gap:10,flexShrink:0,overflow:'auto',maxHeight:140 }
    },
      React.createElement('span', { style:{ fontSize:16,lineHeight:1.3,flexShrink:0 }}, '\u26a0\ufe0f'),
      React.createElement('div', { style:{ display:'flex',flexDirection:'column',gap:4,flex:1,minWidth:0 }},
        Object.keys(overbookedEmps).length > 0 && React.createElement('div', {},
          React.createElement('span', { style:{ fontSize:12,fontWeight:700,color:'#991b1b' }}, `Employee Overbooking \u2014 ${Object.keys(overbookedEmps).length} employee${Object.keys(overbookedEmps).length>1?'s':''}:`),
          React.createElement('div', { style:{ display:'flex',flexWrap:'wrap',gap:4,marginTop:2 }},
            Object.entries(overbookedEmps).map(([emp, conflicts]) =>
              React.createElement('span', {
                key:emp,
                title: conflicts.map(c => `${c.date}: ${c.projects.join(' & ')}`).join('\n'),
                style:{ fontSize:11,fontWeight:600,color:'#dc2626',background:'#fff',padding:'2px 8px',borderRadius:4,border:'1px solid #fca5a5',cursor:'help',whiteSpace:'nowrap' }
              }, `${emp} (${conflicts.length} day${conflicts.length>1?'s':''})`)
            )
          )
        ),
        Object.keys(overbookedEquip).length > 0 && React.createElement('div', {},
          React.createElement('span', { style:{ fontSize:12,fontWeight:700,color:'#9a3412' }}, `Equipment Overbooking \u2014 ${Object.keys(overbookedEquip).length} item${Object.keys(overbookedEquip).length>1?'s':''}:`),
          React.createElement('div', { style:{ display:'flex',flexWrap:'wrap',gap:4,marginTop:2 }},
            Object.entries(overbookedEquip).map(([eq, conflicts]) =>
              React.createElement('span', {
                key:eq,
                title: conflicts.map(c => `${c.date}: ${c.projects.join(' & ')}`).join('\n'),
                style:{ fontSize:11,fontWeight:600,color:'#ea580c',background:'#fff',padding:'2px 8px',borderRadius:4,border:'1px solid #fdba74',cursor:'help',whiteSpace:'nowrap' }
              }, `${eq} (${conflicts.length} day${conflicts.length>1?'s':''})`)
            )
          )
        )
      )
    ),

    /* ── Modals ── */
    React.createElement(ProjectFormModal, { open:showProjectModal, onClose:()=>{ setShowProjectModal(false); setEditProject(null); }, onSave:handleSaveProject, onDelete:handleDeleteProject, onSplit:handleSplitProject, project:editProject, allEmployees:employees, allEquipment:equipment, usedColors }),
    React.createElement(CSVImportModal, { open:showImport, onClose:()=>setShowImport(false), onImport:handleImportProjects }),
    React.createElement(ManageEmployeesModal, { open:showEmployees, onClose:()=>setShowEmployees(false), employees, onUpdate:handleUpdateEmployees }),
    React.createElement(ManageEquipmentModal, { open:showEquipment, onClose:()=>setShowEquipment(false), equipment, onUpdate:handleUpdateEquipment }),
    quickEdit && React.createElement(QuickEditPopup, { project:quickEdit.project, position:quickEdit.position, allItems:quickEdit.field==='equipment'?equipment:employees, field:quickEdit.field==='equipment'?'equipment':'employees', onUpdate:handleQuickUpdate, onClose:()=>setQuickEdit(null) }),
    React.createElement(UserPickerModal, { open:showUserPicker, onSelect:selectUser, allUsers:PROJECT_MANAGERS }),
    React.createElement(ActivityDashboard, { open:showDashboard, onClose:()=>setShowDashboard(false) }),

    React.createElement('style', {}, `
      @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
      @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
      @keyframes overbookPulse { 0%,100% { box-shadow:0 0 2px #dc2626; } 50% { box-shadow:0 0 8px #dc2626; } }
      ::-webkit-scrollbar { width:6px; height:6px; }
      ::-webkit-scrollbar-track { background:transparent; }
      ::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }
      ::-webkit-scrollbar-thumb:hover { background:#9ca3af; }
      input:focus { border-color:#2563eb !important; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
    `)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
